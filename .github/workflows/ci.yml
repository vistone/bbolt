name: CI

# Runs on every push to master and every pull request.
# Verifies the plugin builds and tests pass, but does NOT publish anything.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up JDK 8 (for Maven bolt-jna build)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('jetbrains-plugin/**/*.gradle*', 'jetbrains-plugin/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build & install bolt-jna (Maven)
        run: |
          export JAVA_HOME=$JAVA_HOME_8_X64
          mvn -B install -DskipTests -Dgpg.skip=true

      - name: Build & test JetBrains plugin
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          cd jetbrains-plugin
          ./gradlew --no-daemon clean test buildPlugin

      - name: Upload plugin zip (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: bbolt-jetbrains-plugin-ci
          path: jetbrains-plugin/build/distributions/*.zip
          if-no-files-found: error

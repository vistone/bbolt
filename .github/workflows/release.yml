name: Release

# Triggered when a version tag (v1.0.14, v2.0.0, etc.) is pushed.
# Builds the plugin, packages the zip, and attaches it to a GitHub Release.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # required by softprops/action-gh-release to create the release

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      # --- Checkout ---------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # --- JDK setup --------------------------------------------------------
      # JDK 17 for the IntelliJ Platform (Gradle) build.
      # JDK 8 is also installed for the legacy Maven bolt-jna-core build.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up JDK 8 (for Maven bolt-jna build)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      # --- Maven cache ------------------------------------------------------
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # --- Gradle cache -----------------------------------------------------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('jetbrains-plugin/**/*.gradle*', 'jetbrains-plugin/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # --- Build & install bolt-jna-core / bolt-jna-native ------------------
      # The JetBrains plugin depends on these artifacts in the local Maven repo.
      # Skip GPG signing (configured in the parent pom) — not needed for local install.
      - name: Build & install bolt-jna (Maven)
        run: |
          # Use JDK 8 for the Maven build (source/target 1.8 in pom.xml)
          export JAVA_HOME=$JAVA_HOME_8_X64
          mvn -B install -DskipTests -Dgpg.skip=true

      # --- Build the JetBrains plugin ---------------------------------------
      # Switch back to JDK 17 for the IntelliJ Platform build.
      - name: Build JetBrains plugin
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          cd jetbrains-plugin
          ./gradlew --no-daemon clean buildPlugin

      # --- Extract version from tag -----------------------------------------
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # --- Locate the built zip ---------------------------------------------
      - name: Locate plugin zip
        id: zip
        run: |
          zip_path=$(find jetbrains-plugin/build/distributions -name "*.zip" | head -1)
          echo "path=$zip_path" >> "$GITHUB_OUTPUT"
          echo "Found: $zip_path"

      # --- Verify build.gradle.kts version matches tag ---------------------
      # Note: plugin.xml has no <version> tag in source — it's injected by
      # Gradle's patchPluginXml task at build time. We only check build.gradle.kts
      # here; the built zip's plugin.xml version is verified by the Gradle build
      # itself (patchPluginXml fails on mismatch).
      - name: Verify version consistency
        run: |
          tag_version="${{ steps.version.outputs.version }}"
          gradle_version=$(grep -oP '(?<=version = ")[^"]+' jetbrains-plugin/build.gradle.kts)
          echo "Tag version:      $tag_version"
          echo "build.gradle.kts: $gradle_version"
          if [ "$tag_version" != "$gradle_version" ]; then
            echo "::error::Version mismatch — tag=$tag_version, build.gradle.kts=$gradle_version"
            exit 1
          fi

      # --- Upload build artifact (for debugging) ----------------------------
      - name: Upload plugin zip (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: bbolt-jetbrains-plugin-${{ steps.version.outputs.version }}
          path: ${{ steps.zip.outputs.path }}
          if-no-files-found: error

      # --- Create / update GitHub Release with the zip attached -------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.zip.outputs.path }}
          draft: false
          prerelease: false
